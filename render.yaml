services:
  - type: web
    name: renegade-finder
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: SCAN_TOKEN
        sync: false
      - key: AUTOFORCE_TOKEN
        sync: false
      - key: DB_PATH
        value: /tmp/renegade_finder.db
      - key: NEW_WINDOW_HOURS
        value: 72
